name: pharma_arena
description: Pharma Arena — Master Pharmacology with AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.0
  webview_flutter_android: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/web/index.html
    - assets/web/manifest.json
    - assets/web/sw.js
    - assets/web/icon-192.png
    - assets/web/icon-512.png
