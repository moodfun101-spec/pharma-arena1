<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg: #020817;
  --bg2: #0a1628;
  --bg3: #0f2040;
  --primary: #1991ff;
  --primary2: #0074e4;
  --cyan: #22d3ee;
  --purple: #8b5cf6;
  --glass: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Sora',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#1991ff33;border-radius:2px}

/* Utilities */
.glass{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border)}
.gradient-text{background:linear-gradient(135deg,var(--primary),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mesh-bg{background:radial-gradient(at 40% 20%,rgba(25,145,255,.07) 0,transparent 50%),radial-gradient(at 80% 0%,rgba(139,92,246,.07) 0,transparent 50%),var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 4px 20px rgba(25,145,255,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(25,145,255,.4)}
.btn-secondary{background:var(--glass);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.08)}
.btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.input:focus{border-color:rgba(25,145,255,.5);background:rgba(255,255,255,.07)}
.input::placeholder{color:var(--muted)}
.card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:24px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--cyan));transition:width .7s ease}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .4s ease forwards}
.slide-up{animation:slideUp .3s ease forwards}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(10,22,40,.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;transition:transform .3s}
#sidebar.hidden{transform:translateX(-100%)}
#main{flex:1;margin-left:260px;min-height:100vh;transition:margin .3s}
#main.full{margin-left:0}
.mobile-header{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(10,22,40,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.page-content{padding:32px;max-width:1100px;margin:0 auto}

/* Sidebar */
.sidebar-logo{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(25,145,255,.3)}
.logo-text{font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#fff;line-height:1}
.logo-sub{font-size:10px;color:var(--primary);letter-spacing:2px;font-weight:600}
.user-card{margin:16px 12px;padding:16px;background:var(--glass);border:1px solid var(--border);border-radius:16px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:14px;font-weight:500;margin:2px 12px}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(25,145,255,.12);color:var(--primary);border:1px solid rgba(25,145,255,.25)}
.nav-icon{font-size:18px;width:22px;text-align:center}
.live-badge{margin-left:auto;background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}

/* Auth Page */
#auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(at 30% 20%,rgba(25,145,255,.1) 0,transparent 50%),radial-gradient(at 80% 80%,rgba(139,92,246,.1) 0,transparent 50%),var(--bg)}
.auth-card{width:100%;max-width:420px;background:rgba(15,32,64,.8);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:28px;padding:36px}
.auth-tabs{display:flex;background:var(--glass);border-radius:12px;padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:10px;border-radius:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:all .2s}
.auth-tab.active{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(25,145,255,.3)}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{padding:20px;border-radius:16px;text-align:center}
.stat-val{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted)}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.quick-card{padding:24px;border-radius:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;border:1px solid var(--border);background:var(--glass)}
.quick-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.2)}
.quick-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.systems-mini{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.system-mini-card{padding:16px 8px;border-radius:16px;text-align:center;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--glass)}
.system-mini-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2)}
.system-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px}

/* Systems Page */
.systems-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.system-card{padding:20px;border-radius:20px;cursor:pointer;transition:all .3s;border:1px solid var(--border);background:var(--glass)}
.system-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.2);box-shadow:0 8px 30px rgba(0,0,0,.3)}

/* Quiz */
.quiz-container{max-width:720px;margin:0 auto}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.timer-box{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:12px;border:1px solid rgba(25,145,255,.3);background:rgba(25,145,255,.1);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--primary)}
.timer-box.warning{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.1);color:#f87171;animation:pulse .5s ease infinite}
.question-card{padding:32px;border-radius:24px;margin-bottom:20px;background:rgba(15,32,64,.6);border:1px solid var(--border)}
.question-text{font-family:'Sora',sans-serif;font-size:20px;font-weight:600;color:#fff;line-height:1.5}
.options-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.option-btn{padding:16px 20px;border-radius:14px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--glass);text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;align-items:center;gap:12px;width:100%}
.option-btn:hover:not(:disabled){border-color:rgba(25,145,255,.4);background:rgba(25,145,255,.08)}
.option-btn.correct{border-color:rgba(34,197,94,.6);background:rgba(34,197,94,.12);color:#86efac}
.option-btn.wrong{border-color:rgba(239,68,68,.6);background:rgba(239,68,68,.12);color:#fca5a5}
.option-btn.selected{border-color:rgba(25,145,255,.5);background:rgba(25,145,255,.1)}
.option-key{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:rgba(255,255,255,.07);border:1px solid var(--border);flex-shrink:0}
.explanation-box{padding:20px;border-radius:16px;background:rgba(15,32,64,.5);border:1px solid var(--border);margin-bottom:16px}
.results-card{padding:40px;border-radius:28px;text-align:center;background:rgba(15,32,64,.7);border:1px solid var(--border)}

/* Multiplayer */
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.room-header{display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.room-code{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:#fff;letter-spacing:.2em}
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.player-slot{padding:16px;border-radius:16px;display:flex;align-items:center;gap:12px}
.player-slot.filled{background:rgba(25,145,255,.08);border:1px solid rgba(25,145,255,.2)}
.player-slot.empty{background:var(--glass);border:1px dashed var(--border)}
.live-scores{display:flex;gap:10px;flex-wrap:wrap;padding:12px;border-radius:14px;background:var(--glass);border:1px solid var(--border);margin-bottom:16px}
.live-score-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:13px}

/* Leaderboard */
.lb-entry{display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:14px;margin-bottom:8px}
.lb-rank{width:32px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;flex-shrink:0}
.lb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}

/* Tutor */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:400px}
.messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:80%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg-avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.msg-bot .msg-avatar{background:linear-gradient(135deg,var(--purple),#7c3aed)}
.msg-user .msg-avatar{background:linear-gradient(135deg,var(--primary),var(--primary2))}
.msg-bubble{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.6;max-width:100%}
.msg-bot .msg-bubble{background:rgba(15,32,64,.7);border:1px solid var(--border);color:var(--text)}
.msg-user .msg-bubble{background:linear-gradient(135deg,rgba(25,145,255,.7),rgba(0,116,228,.7));border:1px solid rgba(25,145,255,.3);color:#fff}
.chat-input-row{display:flex;gap:10px;margin-top:12px}
.typing-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--purple);margin:0 2px;animation:bounce .8s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.drug-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.drug-info-block{padding:16px;border-radius:14px;background:var(--glass);border:1px solid var(--border)}
.info-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* Profile */
.rank-item{display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;margin-bottom:8px}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.badge-item{padding:16px;border-radius:14px;text-align:center;font-size:11px}

/* Admin */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{text-align:left;padding:10px 14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.admin-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.admin-table tr:hover td{background:rgba(255,255,255,.02)}

/* Responsive */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:none}
  #main{margin-left:0}
  .mobile-header{display:flex}
  .stats-grid{grid-template-columns:1fr 1fr}
  .quick-grid{grid-template-columns:1fr}
  .systems-mini{grid-template-columns:repeat(3,1fr)}
  .mp-grid{grid-template-columns:1fr}
  .drug-info-grid{grid-template-columns:1fr}
  .badge-grid{grid-template-columns:repeat(2,1fr)}
  .page-content{padding:16px}
  .systems-grid{grid-template-columns:1fr 1fr}
  .question-text{font-size:16px}
  .room-code{font-size:32px}
}
@media(min-width:769px){
  .mobile-header{display:none}
  .hamburger{display:none}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:99}
.overlay.open{display:block}
select option{background:#0a1628;color:#e2e8f0}
</style>

const RANKS=[
  {name:"Novice",minXP:0,badge:"🌱"},
  {name:"Learner",minXP:200,badge:"📖"},
  {name:"Student",minXP:600,badge:"🎓"},
  {name:"Resident",minXP:1500,badge:"🏥"},
  {name:"Clinician",minXP:4000,badge:"💊"},
  {name:"Expert",minXP:8000,badge:"⚡"},
  {name:"Clinical Master",minXP:15000,badge:"🏆"},
  {name:"Pharma Legend",minXP:30000,badge:"👑"}
];

const LEVELS=["beginner","intermediate","advanced","expert","master"];
const LEVEL_ICONS=["🌱","📚","⚡","🏆","👨‍⚕️"];

function getRank(xp){
  let r=RANKS[0];
  for(const rk of RANKS){if(xp>=rk.minXP)r=rk;else break;}
  return r;
}

async function loadProfile(uid){
  const snap = await firestore.collection('users').doc(uid).get();
  if(snap.exists) userProfile=snap.data();
  else userProfile={uid,xp:0,totalCorrect:0,totalAnswered:0,wins:0,losses:0,streak:0,badges:[]};
  updateSidebar();
}

function updateSidebar(){
  if(!currentUser||!userProfile) return;
  const name = currentUser.displayName||'Pharmacist';
  const xp = userProfile.xp||0;
  const rank = getRank(xp);
  const acc = userProfile.totalAnswered ? Math.round((userProfile.totalCorrect/userProfile.totalAnswered)*100) : 0;
  const nextRank = RANKS.find(r=>r.minXP>xp);
  const curRank = RANKS.filter(r=>r.minXP<=xp).pop()||RANKS[0];
  const pct = nextRank ? ((xp-curRank.minXP)/(nextRank.minXP-curRank.minXP))*100 : 100;

  document.getElementById('sb-avatar').textContent = name[0].toUpperCase();
  document.getElementById('sb-name').textContent = name;
  document.getElementById('sb-rank').textContent = `${rank.badge} ${rank.name}`;
  document.getElementById('sb-xp').textContent = xp.toLocaleString()+' XP';
  document.getElementById('sb-xp-bar').style.width = Math.min(pct,100)+'%';
  document.getElementById('sb-acc').textContent = acc+'%';
  document.getElementById('sb-wins').textContent = userProfile.wins||0;
  document.getElementById('sb-streak').textContent = userProfile.streak||0;
  document.getElementById('mob-xp').textContent = xp.toLocaleString()+' XP';
}

async function addXP(amount, action){
  if(!currentUser||!userProfile) return;
  const updates={xp:(userProfile.xp||0)+amount};
  if(action==='correct'){updates.totalCorrect=(userProfile.totalCorrect||0)+1;updates.totalAnswered=(userProfile.totalAnswered||0)+1;}
  else if(action==='wrong'){updates.totalAnswered=(userProfile.totalAnswered||0)+1;}
  else if(action==='win'){updates.wins=(userProfile.wins||0)+1;}
  else if(action==='loss'){updates.losses=(userProfile.losses||0)+1;}
  Object.assign(userProfile,updates);
  await firestore.collection('users').doc(currentUser.uid).update(updates);
  updateSidebar();
}

async function doLogin(){
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  if(!email||!pass) return toast('Please fill all fields','error');
  try{
    await auth.signInWithEmailAndPassword(email,pass);
  } catch(e){
    const msg=e.code==='auth/user-not-found'?'No account found'
      :e.code==='auth/wrong-password'?'Wrong password'
      :e.code==='auth/invalid-credential'?'Incorrect email or password'
      :e.code==='auth/invalid-email'?'Invalid email format'
      :e.message;
    toast(msg,'error');
  }
}
async function doSignup(){
  const name=(document.getElementById('auth-name')?.value||'').trim();
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  if(!name) return toast('Please enter a username','error');
  if(!email) return toast('Please enter your email','error');
  if(!pass||pass.length<6) return toast('Password must be at least 6 characters','error');
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    await firestore.collection('users').doc(cred.user.uid).set({
      uid:cred.user.uid,username:name,email,xp:0,totalCorrect:0,
      totalAnswered:0,wins:0,losses:0,streak:0,badges:[],
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('Welcome to Pharma Arena! 🎉');
  } catch(e){
    const msg=e.code==='auth/email-already-in-use'?'Email already registered'
      :e.code==='auth/weak-password'?'Password too weak'
      :e.code==='auth/invalid-email'?'Invalid email format'
      :e.message;
    toast(msg,'error');
  }
}

async function launchQuiz(systemId){

  document.getElementById('page').innerHTML=`

    </div>

  </div>`;
  try{

function renderQuestion(){
  const {questions,current,score,earned,streak}=quizState;
  const q=questions[current];
  const pct=(current/questions.length)*100;
  const sys=SYSTEMS.find(s=>s.id===quizState.systemId);
  document.getElementById('page').innerHTML=`
  <div class="quiz-container fade-in">
    <div class="quiz-header">

      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${streak>=3?`<span style="color:#fb923c;font-size:14px;font-weight:700">🔥 ${streak}</span>`:''}
        <div class="timer-box" id="timer-box">⏱ <span id="timer-val">30</span>s</div>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:16px;margin-bottom:16px;font-size:13px">
      <span style="color:#4ade80">✓ ${score} correct</span>
      <span style="color:var(--primary)">+${earned} XP</span>
    </div>
    <div class="question-card">
      ${q.type==='CaseStudy'?`<div style="background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:16px;margin-bottom:16px"><p style="font-size:11px;color:var(--cyan);font-weight:700;text-transform:uppercase;margin-bottom:8px">Clinical Case</p>${q.patient?`<p style="font-size:13px;color:var(--text);margin-bottom:6px"><span style="color:var(--muted)">Patient:</span> ${q.patient}</p>`:''}${q.presentation?`<p style="font-size:13px;color:var(--text)"><span style="color:var(--muted)">Presentation:</span> ${q.presentation}</p>`:''}</div>`:''}
      <p class="question-text">${q.question||q.title}</p>
    </div>
    <div class="options-grid" id="options">${renderOptions(q)}</div>
    <div id="explanation-area"></div>
    <div id="next-btn-area"></div>
  </div>`;
  startTimer(30);
}

function renderOptions(q){
  return (q.options||[]).map((opt,i)=>{
    const key=['A','B','C','D'][i]||opt;
    return `<button class="option-btn" onclick="selectAnswer('${key}','${key===opt?opt:key}')" id="opt-${key}">
      <span class="option-key">${['A','B','C','D'][i]||((i===0)?'T':'F')}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');
}

let timerInterval=null;
function startTimer(sec){
  clearInterval(timerInterval);
  let t=sec;
  document.getElementById('timer-val').textContent=t;
  timerInterval=setInterval(()=>{
    t--;
    const el=document.getElementById('timer-val');
    const box=document.getElementById('timer-box');
    if(!el){clearInterval(timerInterval);return;}
    el.textContent=t;
    if(t<=10&&box){box.classList.add('warning');}
    if(t<=0){clearInterval(timerInterval);selectAnswer(null,null);}
  },1000);
}

async function selectAnswer(key,opt){
  clearInterval(timerInterval);
  const q=quizState.questions[quizState.current];
  const isCorrect=key===q.correct||opt===q.correct;
  const xp=isCorrect?10:2;
  const newStreak=isCorrect?quizState.streak+1:0;
  let bonus=0;
  if(newStreak===5)bonus=25;
  if(newStreak===10)bonus=50;
  quizState.streak=newStreak;
  quizState.earned=(quizState.earned||0)+xp+bonus;
  quizState.results=[...quizState.results,{q,selected:key,correct:isCorrect}];
  if(isCorrect) quizState.score++;

  // Visual feedback
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const correctKey=q.correct;
  const correctBtn=document.getElementById('opt-'+correctKey);
  if(correctBtn) correctBtn.classList.add('correct');
  if(key&&key!==q.correct){
    const wrongBtn=document.getElementById('opt-'+key);
    if(wrongBtn) wrongBtn.classList.add('wrong');
  }

  await addXP(xp+bonus, isCorrect?'correct':'wrong');
  if(isCorrect) toast(newStreak>=3?`🔥 ${newStreak} streak! +${xp+bonus} XP`:`Correct! +${xp} XP`);
  else toast(key?'Wrong answer':'⏰ Time\'s up!','error');

  const expArea=document.getElementById('explanation-area');
  if(expArea&&q.explanation){
    expArea.innerHTML=`<div class="explanation-box slide-up"><p style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px">Explanation</p><p style="font-size:13px;color:var(--text);line-height:1.6">${q.explanation}</p></div>`;
  }
  const nextArea=document.getElementById('next-btn-area');
  if(nextArea){
    nextArea.innerHTML=`<button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px" onclick="nextQuestion()">${quizState.current+1>=quizState.questions.length?'📊 View Results':'Next Question →'}</button>`;
  }
}

function nextQuestion(){
  if(quizState.current+1>=quizState.questions.length){
    renderQuizResults();
  } else {
    quizState.current++;
    renderQuestion();
  }
}

function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

async function createRoom(){
  const code=genCode();
  const settings={
    system:document.getElementById('mp-system').value,
    level:document.getElementById('mp-level').value,
    questionCount:parseInt(document.getElementById('mp-count').value),
    timePerQuestion:parseInt(document.getElementById('mp-time').value),
    maxPlayers:parseInt(document.getElementById('mp-max').value)
  };
  await rtdb.ref(`rooms/${code}`).set({
    code,host:currentUser.uid,hostName:currentUser.displayName||'Host',
    status:'waiting',settings,
    players:{[currentUser.uid]:{name:currentUser.displayName||'Host',uid:currentUser.uid,score:0}},
    createdAt:Date.now()
  });
  multiState={code,isHost:true,settings};
  listenRoom(code);
  renderWaitingRoom(code);
}

async function joinRoom(){
  const code=document.getElementById('join-code').value.toUpperCase().trim();
  if(!code)return toast('Enter a room code','error');
  const snap=await rtdb.ref(`rooms/${code}`).get();
  if(!snap.exists())return toast('Room not found','error');
  const data=snap.val();
  if(data.status!=='waiting')return toast('Game already started','error');
  if(Object.keys(data.players||{}).length>=(data.settings?.maxPlayers||4))return toast('Room is full','error');
  await rtdb.ref(`rooms/${code}/players/${currentUser.uid}`).set({name:currentUser.displayName||'Player',uid:currentUser.uid,score:0});
  multiState={code,isHost:false,settings:data.settings};
  listenRoom(code);
  renderWaitingRoom(code);
}

function listenRoom(code){
  if(roomListener){roomListener();roomListener=null;}
  roomListener=rtdb.ref(`rooms/${code}`).on('value',snap=>{
    const data=snap.val();
    if(!data){toast('Room closed','error');navigate('multiplayer');return;}
    multiState.roomData=data;
    if(data.status==='playing'&&!multiState.inBattle){
      multiState.inBattle=true;
      multiState.questions=data.questions||[];
      multiState.current=0;
      renderBattle();
    }
    if(data.status==='finished'){
      renderBattleResults(data.results);
    }
    // Update player list if in waiting room
    const pList=document.getElementById('mp-players');
    if(pList) updatePlayerList(data);
  });
}

function updatePlayerList(data){
  const players=Object.values(data.players||{});
  const settings=data.settings||{};
  const pList=document.getElementById('mp-players');
  if(!pList)return;
  let html='';
  players.forEach(p=>{
    html+=`<div class="player-slot filled"><div class="lb-avatar" style="width:36px;height:36px;font-size:14px">${p.name[0].toUpperCase()}</div><div><p style="font-weight:600;color:#fff;font-size:14px">${p.name}</p>${p.uid===data.host?'<p style="font-size:11px;color:#fbbf24">👑 Host</p>':''}</div></div>`;
  });
  for(let i=players.length;i<(settings.maxPlayers||4);i++){
    html+=`<div class="player-slot empty"><div style="width:36px;height:36px;border-radius:50%;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted)">?</div><p style="font-size:13px;color:var(--muted)">Waiting...</p></div>`;
  }
  pList.innerHTML=html;
  const startBtn=document.getElementById('mp-start-btn');
  if(startBtn) startBtn.disabled=players.length<2;
}

function renderWaitingRoom(code){
  document.getElementById('page').innerHTML=`
  <div style="max-width:560px;margin:0 auto;text-align:center" class="fade-in">
    <div class="card">
      <p style="color:var(--muted);font-size:13px;margin-bottom:8px">Room Code</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px">
        <div class="room-code">${code}</div>
        <button onclick="navigator.clipboard?.writeText('${code}');toast('Copied!')" style="background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:pointer;color:var(--muted)">📋</button>
      </div>
      <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Share this code with friends to join the battle</p>
      <div class="players-grid" id="mp-players" style="margin-bottom:24px"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-secondary" style="flex:1" onclick="leaveRoom()">Leave</button>
        ${multiState.isHost?`<button class="btn btn-primary" style="flex:1" id="mp-start-btn" onclick="startGame()" disabled>Start Battle ⚔️</button>`:`<p style="flex:1;text-align:center;color:var(--muted);font-size:13px;padding:12px">Waiting for host to start...</p>`}
      </div>
    </div>
  </div>`;
}

async function startGame(){
  const {code,settings}=multiState;
  toast('Generating questions...','info');
  try{
    const sys=SYSTEMS.find(s=>s.id===settings.system);
    const qs=await geminiGenerateQuiz(sys?.name||'Pharmacology',settings.level,'MCQ',settings.questionCount);
    await rtdb.ref(`rooms/${code}`).update({status:'playing',questions:qs.slice(0,settings.questionCount),startedAt:Date.now()});
  } catch(e){
    toast('Failed to generate questions','error');
  }
}

function renderBattle(){
  const {questions,current,roomData,settings}=multiState;
  const q=questions[current];
  const players=Object.values(roomData?.players||{}).sort((a,b)=>b.score-a.score);
  const timePerQ=settings?.timePerQuestion||20;
  document.getElementById('page').innerHTML=`
  <div class="quiz-container fade-in">
    <div class="live-scores">${players.map((p,i)=>`<div class="live-score-item" style="background:${p.uid===currentUser.uid?'rgba(25,145,255,.1)':'var(--glass)'};border:1px solid ${p.uid===currentUser.uid?'rgba(25,145,255,.2)':'var(--border)'};">${i===0?'👑 ':''}<span style="font-weight:600;color:#fff">${p.name.split(' ')[0]}</span><span style="color:var(--primary);font-family:'JetBrains Mono',monospace;font-weight:600">${p.score}</span></div>`).join('')}</div>
    <div class="quiz-header">
      <p style="color:var(--muted);font-size:13px">Q ${current+1}/${questions.length}</p>
      <div class="timer-box" id="battle-timer-box">⏱ <span id="battle-timer">${timePerQ}</span>s</div>
    </div>
    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${(current/questions.length)*100}%"></div></div>
    <div class="question-card"><p class="question-text">${q.question}</p></div>
    <div class="options-grid" id="battle-options">
      ${(q.options||[]).map((opt,i)=>{
        const key=['A','B','C','D'][i];
        return `<button class="option-btn" onclick="submitBattleAnswer('${key}')" id="bopt-${key}">
          <span class="option-key">${key}</span><span>${opt}</span>
        </button>`;
      }).join('')}
    </div>
    <div id="battle-exp"></div>
    <div id="battle-next"></div>
  </div>`;
  startBattleTimer(timePerQ);
}

let battleTimerInt=null;
function startBattleTimer(sec){
  clearInterval(battleTimerInt);
  let t=sec;
  battleTimerInt=setInterval(()=>{
    t--;
    const el=document.getElementById('battle-timer');
    const box=document.getElementById('battle-timer-box');
    if(!el){clearInterval(battleTimerInt);return;}
    el.textContent=t;
    if(t<=5&&box)box.classList.add('warning');
    if(t<=0){clearInterval(battleTimerInt);submitBattleAnswer(null);}
  },1000);
}

async function submitBattleAnswer(key){
  clearInterval(battleTimerInt);
  const q=multiState.questions[multiState.current];
  const isCorrect=key===q.correct;
  const timeLeft=parseInt(document.getElementById('battle-timer')?.textContent||'0');
  const curScore=multiState.roomData?.players?.[currentUser.uid]?.score||0;
  const newScore=isCorrect?curScore+(timeLeft*10):curScore;
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const correctBtn=document.getElementById('bopt-'+q.correct);
  if(correctBtn)correctBtn.classList.add('correct');
  if(key&&key!==q.correct){const wb=document.getElementById('bopt-'+key);if(wb)wb.classList.add('wrong');}
  await rtdb.ref(`rooms/${multiState.code}/players/${currentUser.uid}/score`).set(newScore);
  await addXP(isCorrect?10:2,isCorrect?'correct':'wrong');
  if(q.explanation){
    const exp=document.getElementById('battle-exp');
    if(exp)exp.innerHTML=`<div class="explanation-box slide-up"><p style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px">Explanation</p><p style="font-size:13px;color:var(--text);line-height:1.6">${q.explanation}</p></div>`;
  }
  if(multiState.isHost){
    const nextArea=document.getElementById('battle-next');
    if(nextArea){
      const isLast=multiState.current+1>=multiState.questions.length;
      nextArea.innerHTML=`<button class="btn btn-primary" style="width:100%;padding:14px" onclick="${isLast?'endBattle()':'advanceBattle()'}">${isLast?'End Battle':'Next Question →'}</button>`;
    }
  } else {
    const nextArea=document.getElementById('battle-next');
    if(nextArea)nextArea.innerHTML=`<p style="text-align:center;color:var(--muted);font-size:13px;padding:12px">Waiting for host to advance...</p>`;
  }
}

function advanceBattle(){
  multiState.current++;
  multiState.inBattle=true;
  renderBattle();
}

async function endBattle(){
  const players=Object.values(multiState.roomData?.players||{}).sort((a,b)=>b.score-a.score);
  const winner=players[0];
  await rtdb.ref(`rooms/${multiState.code}`).update({status:'finished',results:{players,winner:winner?.name}});
  const isWinner=winner?.uid===currentUser.uid;
  await addXP(isWinner?100:20,isWinner?'win':'loss');
}

async function leaveRoom(){
  if(multiState.code){
    await rtdb.ref(`rooms/${multiState.code}/players/${currentUser.uid}`).remove();

  multiState={};
  navigate('multiplayer');
}
async function deleteRoomAndNew(){

  navigate('multiplayer');

async function loadLB(field){
  ['xp','wins','accuracy'].forEach(f=>{
    const btn=document.getElementById('lb-tab-'+f);
    if(btn){btn.className=`btn ${f===field?'btn-primary':'btn-secondary'}`;btn.style.flex='1';btn.style.padding='10px';btn.style.fontSize='13px';}
  });
  try{
    let snap;
    if(field==='accuracy'){
      snap=await firestore.collection('users').orderBy('totalCorrect','desc').limit(50).get();
    } else {
      snap=await firestore.collection('users').orderBy(field,'desc').limit(50).get();
    }
    let players=snap.docs.map(d=>d.data());
    if(field==='accuracy'){
      players.sort((a,b)=>{
        const aa=a.totalAnswered?(a.totalCorrect/a.totalAnswered)*100:0;
        const ba=b.totalAnswered?(b.totalCorrect/b.totalAnswered)*100:0;
        return ba-aa;
      });
    }
    const myIdx=players.findIndex(p=>p.uid===currentUser.uid);
    document.getElementById('lb-list').innerHTML=`
    ${myIdx>=0?`<div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:rgba(25,145,255,.08);border:1px solid rgba(25,145,255,.25);margin-bottom:16px">
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--primary);font-size:18px">#${myIdx+1}</span>
      <div class="lb-avatar">${currentUser.displayName?.[0]?.toUpperCase()||'P'}</div>
      <div style="flex:1"><p style="font-weight:600;color:#fff">You</p><p style="font-size:12px;color:var(--muted)">${getRank(players[myIdx]?.xp||0).badge} ${getRank(players[myIdx]?.xp||0).name}</p></div>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--primary)">${getDisplayVal(players[myIdx],field)}</span>
    </div>`:''}
    ${players.map((p,i)=>`
    <div class="lb-entry" style="${i<3?'background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12)':'background:var(--glass);border:1px solid var(--border)'};">
      <div class="lb-rank" style="color:${i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#b45309':'var(--muted)'}">${i<3?['🥇','🥈','🥉'][i]:`#${i+1}`}</div>
      <div class="lb-avatar">${(p.username||p.email||'P')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <p style="font-weight:600;color:#fff;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.username||p.email?.split('@')[0]||'Player'}</p>
        <p style="font-size:12px;color:var(--muted)">${getRank(p.xp||0).badge} ${getRank(p.xp||0).name}</p>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#fff;font-size:14px">${getDisplayVal(p,field)}</span>
    </div>`).join('')}`;
  } catch(e){
    document.getElementById('lb-list').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">Failed to load leaderboard</p>';
  }
}

function getDisplayVal(p,field){
  if(field==='xp') return (p.xp||0).toLocaleString()+' XP';
  if(field==='wins') return (p.wins||0)+' wins';
  if(field==='accuracy'){const a=p.totalAnswered?Math.round((p.totalCorrect/p.totalAnswered)*100):0;return a+'%';}
  return '-';
}

function renderMsg(m){
  const formatted=m.content.replace(/\*\*(.*?)\*\*/g,'<strong style="color:#fff">$1</strong>').replace(/\n/g,'<br>');
  return `<div class="msg msg-${m.role==='user'?'user':'bot'}" style="align-self:${m.role==='user'?'flex-end':'flex-start'}">
    <div class="msg-avatar">${m.role==='user'?'👤':'🤖'}</div>
    <div class="msg-bubble">${formatted}</div>
  </div>`;
}

function scrollChat(){setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},100);}

async function sendChat(text){
  const input=document.getElementById('chat-input');
  const msg=text||(input?.value.trim());
  if(!msg) return;
  if(input) input.value='';
  chatMessages.push({role:'user',content:msg});
  const msgs=document.getElementById('chat-msgs');
  if(msgs){
    msgs.innerHTML+=renderMsg({role:'user',content:msg});
    msgs.innerHTML+=`<div class="msg msg-bot" id="typing-msg"><div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    scrollChat();
  }
  try{
    const reply=await geminiChat(chatMessages.slice(-8),msg);
    chatMessages.push({role:'assistant',content:reply});
    const typing=document.getElementById('typing-msg');
    if(typing) typing.outerHTML=renderMsg({role:'assistant',content:reply});
    scrollChat();
  } catch(e){
    const typing=document.getElementById('typing-msg');
    if(typing) typing.outerHTML=renderMsg({role:'assistant',content:'Sorry, I\'m having trouble connecting. Please check your Gemini API key.'});
  }
}

async function adminResetXP(uid){

// ====== GEMINI API ======
async function geminiCall(prompt,system=""){
  const models=["gemini-2.5-flash","gemini-1.5-flash","gemini-pro"];
  let lastErr="";
  for(const model of models){
    try{
      const body={contents:[{role:"user",parts:[{text:(system?system+"\n\n":"")+prompt}]}],generationConfig:{temperature:.7,maxOutputTokens:2048,topP:.9}};
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){const err=await res.json().catch(()=>({}));lastErr=err?.error?.message||res.status;continue;}
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(text) return text;
    }catch(e){lastErr=e.message;continue;}
  }
  throw new Error("Gemini failed: "+lastErr);
}

async function geminiGenerateQuiz(system,level,type,count){
  const raw=await geminiCall(
    `Generate ${count} pharmacology quiz questions about "${system}" at ${level} difficulty, type: ${type}.
Return ONLY a JSON array:
[{"id":"1","question":"...","type":"${type}","options":["A. ...","B. ...","C. ...","D. ..."],"correct":"A","explanation":"...","difficulty":"${level}","system":"${system}"}]
For TrueFalse: options=["True","False"], correct="True" or "False"`,
    'You are an expert pharmacology professor. Return valid JSON only, no markdown.'
  );
  const clean=raw.replace(/```json|```/g,'').trim();
  try{return JSON.parse(clean);}catch{
    const m=clean.match(/\[[\s\S]*\]/);
    if(m) return JSON.parse(m[0]);
    throw new Error('Parse failed');
  }
}

async function geminiChat(history,msg){
  const hist=history.map(m=>`${m.role==='user'?'Student':'PharmBot'}: ${m.content}`).join('\n');
  return await geminiCall(`${hist}\nStudent: ${msg}\nPharmBot:`,
    'You are PharmBot, an expert AI pharmacology tutor. Be concise, use bullet points. Cover mechanism, uses, side effects, interactions when asked about drugs.');
}

async function geminiDrugInfo(drug){
  const raw=await geminiCall(
    `Provide pharmacology info for: ${drug}
Return ONLY JSON:
{"name":"${drug}","class":"...","mechanism":"...","uses":["..."],"sideEffects":["..."],"interactions":["..."],"contraindications":["..."],"dosing":"...","clinicalPearl":"...","mnemonics":"..."}`,
    'You are a pharmacology expert. Return valid JSON only.'
  );
  const clean=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
