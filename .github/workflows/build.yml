name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Check files
        run: |
          echo "=== Flutter project files ==="
          ls pharma_arena_v2/pharma_flutter_v2/
          echo "=== Assets ==="
          ls pharma_arena_v2/pharma_flutter_v2/assets/ || echo "NO ASSETS FOLDER"
          ls pharma_arena_v2/pharma_flutter_v2/assets/web/ || echo "NO WEB FOLDER"

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > pharma_arena_v2/pharma_flutter_v2/android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> pharma_arena_v2/pharma_flutter_v2/android/local.properties

      - name: Get dependencies
        run: cd pharma_arena_v2/pharma_flutter_v2 && flutter pub get

      - name: Build APK
        run: |
          cd pharma_arena_v2/pharma_flutter_v2
          flutter build apk --debug --verbose 2>&1 | grep -E "error:|Error:|FAILED|Exception|warning:" | tail -50

      - uses: actions/upload-artifact@v4
        with:
          name: pharma-arena-apk
          path: pharma_arena_v2/pharma_flutter_v2/build/app/outputs/flutter-apk/app-debug.apk
