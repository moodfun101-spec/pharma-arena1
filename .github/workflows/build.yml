name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Get dependencies
        run: cd pharma_arena_v2/pharma_flutter_v2 && flutter pub get
      - name: Build APK
        run: cd pharma_arena_v2/pharma_flutter_v2 && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: pharma-arena-apk
          path: pharma_arena_v2/pharma_flutter_v2/build/app/outputs/flutter-apk/app-debug.apk
