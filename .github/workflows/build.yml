name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: cd pharma_arena_v2/pharma_flutter_v2 && flutter pub get

      - name: Build APK
        run: cd pharma_arena_v2/pharma_flutter_v2 && flutter build apk --debug --verbose 2>&1 | tail -100

      - name: Find APK
        run: find pharma_arena_v2/pharma_flutter_v2/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        with:
          name: pharma-arena-apk
          path: pharma_arena_v2/pharma_flutter_v2/build/app/outputs/**/*.apk
